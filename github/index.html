<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="2; url=https://github.com/Torro101/MIYO">
  <link rel="canonical" href="https://github.com/Torro101/MIYO">
  <title>Opening GitHub - MIYO</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="../assets/icon.png">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="redirect-panel">
    <section class="redirect-card">
      <p class="eyebrow">GitHub redirect</p>
      <h1 style="font-size: clamp(38px, 7vw, 68px);">Opening MIYO on GitHub.</h1>
      <p class="lead">You should be redirected to the source repository in a moment.</p>
      <div class="hero-actions">
        <a class="button primary" href="https://github.com/Torro101/MIYO">
          <svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#github"></use></svg>
          Continue to GitHub
        </a>
        <a class="button secondary" href="../">
          <svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#arrow-right"></use></svg>
          Back to website
        </a>
      </div>
    </section>
  </main>
  <script>
    window.setTimeout(function () {
      window.location.replace("https://github.com/Torro101/MIYO");
    }, 1400);
  </script>
</body>
</html>
