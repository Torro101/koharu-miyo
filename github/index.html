<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="4; url=https://github.com/Torro101/MIYO">
  <link rel="canonical" href="https://github.com/Torro101/MIYO">
  <title>Opening GitHub - MIYO</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#2c2037">
  <link rel="icon" href="../assets/icon.png">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="redirect-panel">
    <section class="redirect-card" aria-labelledby="redirect-title">
      <div class="github-window">
        <div class="github-titlebar" aria-hidden="true">
          <span class="window-dot"></span>
          <span class="window-dot"></span>
          <span class="window-dot"></span>
          <span>github.com/Torro101/MIYO</span>
        </div>
        <div class="github-body">
          <div class="github-mark">
            <svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#github"></use></svg>
          </div>
          <div>
            <p class="eyebrow">GitHub redirect</p>
            <h1 id="redirect-title">Opening the MIYO repository.</h1>
            <p class="lead">You are being sent to the source code, releases, issues, and contribution history on GitHub.</p>
            <p class="redirect-status">Redirect scheduled</p>
            <div class="hero-actions">
              <a class="button primary" href="https://github.com/Torro101/MIYO">
                <svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#github"></use></svg>
                Continue now
              </a>
              <a class="button secondary" href="../">
                <svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#chevron-left"></use></svg>
                Back to website
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script>
    window.setTimeout(function () {
      window.location.replace("https://github.com/Torro101/MIYO");
    }, 2800);
  </script>
</body>
</html>
